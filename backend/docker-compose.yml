# Local infra for the TPC backend: Postgres + Redis + MinIO (S3).
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tpc
      POSTGRES_PASSWORD: tpc
      POSTGRES_DB: tpc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
